tp_runner: sysbench
warmup_seconds: 30
duration_seconds: 180
injection_delay_seconds: 60
injection_window_seconds: 30
enable_injection: true
injection_repeat: 1
injection_query_dir: benchmarks/tpch/variants/pressure-injection
load_tpch_data: true
max_tps_jitter_pct: 10
min_tp_recovery_ratio_pct: 90
sysbench_threads: 64
sysbench_tables: 8
sysbench_table_size: 50000
sysbench_report_interval: 1
tpcc_scalefactor: 10
tpcc_terminals: 32
tpch_scale_factor: 1
