scenario_name: slow-sql-under-tp
tp_runner: sysbench
enable_injection: true
load_tpch_data: true
injection_query_dir: benchmarks/tpch/variants/pressure-injection
injection_delay_seconds: 60
injection_window_seconds: 45
injection_repeat: 1
dataset_profile_file: benchmarks/datasets/profiles/challenge-lowmem.yaml
hardware_profile_file: experiments/configs/hardware-profiles/16u-32gb.yaml
sql_preset: sql/tuning/pressure_test_params.sql
duration_seconds: 300
warmup_seconds: 30
sysbench_threads: 96
sysbench_tables: 16
sysbench_table_size: 100000
sysbench_report_interval: 1
max_tps_jitter_pct: 10
min_tp_recovery_ratio_pct: 90
tpch_scale_factor: 10
